<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
  <header>
    <div class="brand-lockup">
      <div class="hero-mark" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="47" stroke="#F2E88F" stroke-width="1.5" opacity="0.75"/>
          <circle cx="50" cy="50" r="34" stroke="#5B89DE" stroke-width="1.5" opacity="0.7"/>

        <div class="brand-sub">Who wants to master Copilot Studio?</div>
      </div>
    </div>
    <div class="copilot-badge" aria-label="Microsoft Copilot badge">

          <linearGradient id="copilotBlue" x1="10" y1="12" x2="54" y2="54" gradientUnits="userSpaceOnUse">

          <linearGradient id="copilotTeal" x1="50" y1="10" x2="14" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#72F1D3"/>
            <stop offset="1" stop-color="#12A4FF"/>

        <path d="M22 14C28 10 36 10 42 14L48 18C54 22 54 30 48 34L40 40C35 44 29 44 24 40L16 34C10 30 10 22 16 18L22 14Z" fill="url(#copilotBlue)"/>

        <circle cx="32" cy="32" r="8" fill="#F7FBFF" fill-opacity="0.92"/>

      <span>Copilot</span>

  <div id="app"></div>

  <script src="app.js" defer></script>
